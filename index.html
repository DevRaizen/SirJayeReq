<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Section Plain Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-neutral-100">
    <section class="relative py-16 sm:py-24">
      <div class="mx-auto flex max-w-6xl flex-col items-center gap-10 px-4 sm:px-6 lg:px-8">
        <header class="mx-auto max-w-2xl text-center">
          <p class="text-base font-semibold text-emerald-600">Contact us</p>
          <h2 class="mt-2 text-4xl font-semibold tracking-tight text-neutral-900 sm:text-5xl">
            Lets start working
          </h2>
          <p class="mt-3 text-lg text-neutral-500">
            Fill the form and we'll call you as soon as possible.
          </p>
        </header>

        <div class="flex w-full justify-center">
          <form
            id="contact-form"
            class="w-full max-w-md space-y-5 rounded-2xl border border-neutral-200 bg-neutral-50/80 p-7 shadow-xl backdrop-blur-sm"
          >
            <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
              <div class="space-y-1.5">
                <label class="block text-sm text-neutral-900" for="firstName">Name</label>
                <div class="flex items-center gap-2 rounded-md border border-neutral-300 bg-white px-3 py-2 shadow-sm">
                  <img
                    src="https://www.figma.com/api/mcp/asset/49b8ec48-af63-4857-b251-b91de44efb6a"
                    alt=""
                    class="h-5 w-5"
                  />
                  <input
                    id="firstName"
                    name="firstName"
                    type="text"
                    placeholder="Mayoral"
                    class="block w-full border-0 bg-transparent text-sm text-neutral-700 placeholder-neutral-400 focus:outline-none"
                  />
                </div>
              </div>

              <div class="space-y-1.5">
                <label class="block text-sm text-neutral-900" for="lastName">Last name</label>
                <div class="flex items-center gap-2 rounded-md border border-neutral-300 bg-white px-3 py-2 shadow-sm">
                  <img
                    src="https://www.figma.com/api/mcp/asset/49b8ec48-af63-4857-b251-b91de44efb6a"
                    alt=""
                    class="h-5 w-5"
                  />
                  <input
                    id="lastName"
                    name="lastName"
                    type="text"
                    placeholder="Ven"
                    class="block w-full border-0 bg-transparent text-sm text-neutral-700 placeholder-neutral-400 focus:outline-none"
                  />
                </div>
              </div>
            </div>

            <div class="space-y-1.5">
              <label class="block text-sm text-neutral-900" for="email">Mail</label>
              <div class="flex items-center gap-2 rounded-md border border-neutral-300 bg-white px-3 py-2 shadow-sm">
                <img
                  src="https://www.figma.com/api/mcp/asset/4ac039a1-9296-42d5-9054-d922b090ba5f"
                  alt=""
                  class="h-5 w-5"
                />
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="info@mayoralven.com"
                  class="block w-full border-0 bg-transparent text-sm text-neutral-700 placeholder-neutral-400 focus:outline-none"
                />
              </div>
            </div>

            <div class="space-y-1.5">
              <label class="block text-sm text-neutral-900" for="phone">Phone number</label>
              <div class="flex items-center gap-2 rounded-md border border-neutral-300 bg-white px-3 py-2 shadow-sm">
                <img
                  src="https://www.figma.com/api/mcp/asset/9c07ae84-bdef-4787-bd7d-7abc13b69bd2"
                  alt=""
                  class="h-5 w-5"
                />
                <input
                  id="phone"
                  name="phone"
                  type="tel"
                  placeholder="123 456 789"
                  class="block w-full border-0 bg-transparent text-sm text-neutral-700 placeholder-neutral-400 focus:outline-none"
                />
              </div>
            </div>

            <div class="space-y-1.5">
              <label class="block text-sm text-neutral-900" for="message">Label</label>
              <div class="rounded-md border border-neutral-300 bg-white px-3 py-2 shadow-sm">
                <textarea
                  id="message"
                  name="message"
                  placeholder="Enter a description..."
                  class="block h-28 w-full resize-none border-0 bg-transparent text-sm text-neutral-700 placeholder-neutral-400 focus:outline-none"
                ></textarea>
              </div>
            </div>

            <div class="flex justify-end pt-1">
              <button
                type="submit"
                class="inline-flex items-center justify-center rounded-md bg-neutral-900 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-neutral-800"
              >
                Send form
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <script>
      const form = document.getElementById("contact-form");
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        alert("Form submitted (demo only).");
      });
    </script>
  </body>
</html>
